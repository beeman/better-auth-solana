name: CI

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - main

  pull_request:

  merge_group:

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        uses: ./.github/actions/setup

      - name: Build
        run: bun run build

      - name: Check package
        run: bun x publint

      - name: Check package README links
        run: bun run check:package-readme-links

      - name: Publish to pkg.pr.new
        run: bun pkg-pr-new publish --packageManager=bun .

  check-types:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        uses: ./.github/actions/setup

      - name: Check Types
        run: bun check-types

  compatibility-peers:
    name: compatibility peers (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - better_auth_version: 1.6.0
            label: current
            solana_kit_version: 6.8.0
          - better_auth_version: 1.5.0
            label: floor
            solana_kit_version: 6.8.0
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        uses: ./.github/actions/setup

      - name: Install Compatibility Versions
        run: bun add --no-save better-auth@${{ matrix.better_auth_version }} @solana/kit@${{ matrix.solana_kit_version }}

      - name: Run Compatibility Suite
        run: bun run compatibility

  compatibility-typescript:
    name: compatibility TypeScript (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - label: 5.x
            typescript_version: 5
          - label: 6.x
            typescript_version: 6
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        uses: ./.github/actions/setup

      - name: Install TypeScript Compatibility Version
        run: bun add --no-save typescript@${{ matrix.typescript_version }}

      - name: Run Compatibility Suite
        run: bun run compatibility

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        uses: ./.github/actions/setup

      - name: Syncpack
        run: bun run syncpack:lint

      - name: Lint
        run: bun lint

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        uses: ./.github/actions/setup

      - name: Test
        run: bun run test
